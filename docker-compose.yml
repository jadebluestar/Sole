version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLINICIAN_PASSWORD=sole2026
      - MODEL_PATH=sole_best.pth
    volumes:
      - ./backend:/app
    command: flask run --host=0.0.0.0

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    environment:
      - VITE_API_URL=http://localhost:5000

volumes:
  db_data:
